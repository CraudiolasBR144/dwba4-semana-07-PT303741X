<main>
  <h1>Mande uma mensagem</h1>

  <form>
    <label>* Nome</label>
    <input type="text" class="curto">

    <label>* E-Mail</label>
    <input type="email" class="largo">

    <label>* Telefone (99) 99999-9999</label>
    <input type="tel" class="largo">

    <label>* Assunto</label>
    <select class="largo">
      <option>-- Selecione --</option>
      <option>Reclamação</option>
      <option>Sugestão</option>
      <option>Dúvida</option>
    </select>

    <label>* Mensagem</label>
    <textarea></textarea>

    <fieldset>
      <legend>Opções de Resposta</legend>
      E-Mail <input type="checkbox">
      Telefone <input type="checkbox">
    </fieldset>

    <input type="submit" value="Enviar" class="botao">
  </form>
